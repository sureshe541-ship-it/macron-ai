version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=true
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-test-key}
      - OPENAI_MODEL=gpt-4
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000,http://0.0.0.0:3000
      - FRONTEND_URL=http://frontend:3000
    volumes:
      - ./backend:/app
    networks:
      - macron-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - macron-network
    restart: unless-stopped

networks:
  macron-network:
    driver: bridge
